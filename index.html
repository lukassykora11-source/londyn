<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kvíz o Londýně 🇬🇧</title>
<style>
  :root{
    --red:#FF442D; --dark:#3D5655; --green:#C3DCBE; --cream:#FCFAF4;
    --blue:#1f3a93; --ok:#2e8b57; --no:#d9534f;
  }
  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{
    margin:0; font-family:"Trebuchet MS","Segoe UI",system-ui,sans-serif;
    background:var(--cream); color:var(--dark);
    height:100vh; overflow:hidden;
    display:flex; flex-direction:column; justify-content:center; align-items:center;
    padding:1.5vh 2vw;
  }
  .app{width:100%; max-width:1500px; display:flex; flex-direction:column; height:100%;
    justify-content:center;}
  header{text-align:center; flex:0 0 auto;}
  header h1{font-size:4.2vh; margin:0; color:var(--red);}
  header p{margin:0.3vh 0 0; font-size:2.2vh; color:var(--dark);}
  .flag-strip{height:1vh; border-radius:1vh; margin:1vh 0;
    background:linear-gradient(90deg,var(--blue) 0 33%,var(--red) 33% 66%,var(--blue) 66% 100%);}
  .card{
    background:#fff; border:0.35vh solid var(--dark); border-radius:2vh;
    padding:2vh 2.5vw; box-shadow:0 0.8vh 0 var(--dark);
    flex:1 1 auto; min-height:0; display:flex; flex-direction:column; justify-content:center;
  }
  .progress{font-size:2.2vh; color:var(--dark); margin-bottom:1vh; font-weight:bold; text-align:center; flex:0 0 auto;}
  /* hlavní část: obrázek vlevo, otázka+odpovědi vpravo */
  .qwrap{display:flex; gap:2.5vw; align-items:center; flex:1 1 auto; min-height:0;}
  .pic{flex:0 0 38%; display:flex; justify-content:center; align-items:center; height:100%;}
  .pic img, .pic svg{
    width:100%; max-height:52vh;
    object-fit:cover; border-radius:1.5vh; background:var(--green);
    border:0.35vh solid var(--dark);
  }
  .qside{flex:1 1 auto; display:flex; flex-direction:column; justify-content:center; min-width:0;}
  .q{font-size:3.4vh; font-weight:bold; margin:0 0 1.8vh; line-height:1.2;}
  .opts{display:grid; grid-template-columns:1fr 1fr; gap:1.4vh 1.4vw;}
  button.opt{
    font:inherit; font-size:2.5vh; text-align:center; cursor:pointer;
    padding:1.8vh 1vw; border-radius:1.5vh; border:0.35vh solid var(--dark);
    background:var(--cream); color:var(--dark); transition:transform .05s;
  }
  button.opt:hover{background:var(--green);}
  button.opt:active{transform:translateY(0.3vh);}
  button.opt.correct{background:var(--ok); color:#fff; border-color:var(--ok);}
  button.opt.wrong{background:var(--no); color:#fff; border-color:var(--no);}
  button.opt:disabled{cursor:default;}
  .feedback{margin-top:1.5vh; font-size:3vh; font-weight:bold; min-height:1.2em;}
  .feedback.ok{color:var(--ok);}
  .feedback.no{color:var(--no);}
  .fact{
    margin-top:1.2vh; font-size:2.2vh; line-height:1.3; font-weight:600;
    background:var(--green); color:var(--dark);
    border:0.3vh solid var(--dark); border-radius:1.5vh;
    padding:1.4vh 1.6vw; display:none;
  }
  .next{
    margin-top:1.5vh; width:100%; font:inherit; font-size:2.8vh; font-weight:bold;
    padding:1.6vh; border-radius:1.5vh; border:none; background:var(--red); color:#fff;
    cursor:pointer; display:none;
  }
  .next:active{transform:translateY(0.3vh);}
  .result{text-align:center; margin:auto;}
  .result h2{color:var(--red); font-size:5vh; margin:1vh 0;}
  .score{font-size:8vh; font-weight:bold; color:var(--dark); margin:1vh 0;}
  .medal{font-size:11vh; margin:0; line-height:1;}
  .result p{font-size:2.8vh; max-width:30ch; margin:1vh auto;}
  .again{
    margin-top:1.5vh; font:inherit; font-size:2.8vh; font-weight:bold;
    padding:1.6vh 3vw; border-radius:1.5vh; border:none; background:var(--dark); color:#fff; cursor:pointer;
  }
  footer{text-align:center; font-size:1.5vh; color:var(--dark); opacity:.6; margin-top:1vh; flex:0 0 auto;}
  /* Mobil / na výšku: poskládat pod sebe, obrázek menší */
  @media (max-aspect-ratio:3/4){
    body{overflow:auto; height:auto; min-height:100vh;}
    .qwrap{flex-direction:column; gap:1.5vh;}
    .pic{flex:0 0 auto; width:100%;}
    .pic img,.pic svg{max-height:30vh;}
    .opts{grid-template-columns:1fr;}
    header h1{font-size:5vw;} .q{font-size:5vw;} button.opt{font-size:4.5vw; padding:3vw;}
    .feedback{font-size:5vw;} .next{font-size:5vw;}
  }
</style>
</head>
<body>
<div class="app">
  <header>
    <h1>🇬🇧 Velký kvíz o Londýně</h1>
    <p>Pro chytré objevitele!</p>
    <div class="flag-strip"></div>
  </header>
  <div id="screen" class="card"></div>
  <footer>Made for the best Montessori project ever ✨</footer>
</div>

<script>
const IMG_DIR = "images/";


/* Náhradní kresby pro případ, že fotka chybí */
const FALLBACK = {
  bigben:`<svg viewBox="0 0 200 150"><rect width="200" height="150" fill="#9fc3d8"/><rect x="80" y="20" width="40" height="120" fill="#caa46a"/><rect x="88" y="34" width="24" height="24" fill="#fdf6e3"/></svg>`,
  bus:`<svg viewBox="0 0 200 150"><rect width="200" height="150" fill="#cfe8d6"/><rect x="30" y="45" width="140" height="70" rx="10" fill="#FF442D"/><circle cx="60" cy="120" r="12"/><circle cx="140" cy="120" r="12"/></svg>`,
  buckingham:`<svg viewBox="0 0 200 150"><rect width="200" height="150" fill="#bcdcff"/><rect x="20" y="60" width="160" height="70" fill="#e9e2d0"/></svg>`,
  towerbridge:`<svg viewBox="0 0 200 150"><rect width="200" height="150" fill="#bfe0ef"/><rect x="50" y="40" width="22" height="80" fill="#cfd6dd"/><rect x="128" y="40" width="22" height="80" fill="#cfd6dd"/></svg>`,
  westminster:`<svg viewBox="0 0 200 150"><rect width="200" height="150" fill="#cdd8e6"/><rect x="20" y="60" width="160" height="70" fill="#cbb48f"/></svg>`,
  flag:`<svg viewBox="0 0 200 150"><rect width="200" height="150" fill="#1f3a93"/><rect x="84" width="32" height="150" fill="#fff"/><rect y="59" width="200" height="32" fill="#fff"/><rect x="90" width="20" height="150" fill="#FF442D"/><rect y="65" width="200" height="20" fill="#FF442D"/></svg>`,
  mapa:`<svg viewBox="0 0 200 150"><rect width="200" height="150" fill="#bfe0ef"/><circle cx="92" cy="92" r="6" fill="#FF442D"/></svg>`,
  temze:`<svg viewBox="0 0 200 150"><rect width="200" height="150" fill="#cfe8d6"/><path d="M0 40 Q60 70 100 60 T200 90" stroke="#3a7bd5" stroke-width="16" fill="none"/></svg>`,
  koruna:`<svg viewBox="0 0 200 150"><rect width="200" height="150" fill="#f3e6c4"/><polygon points="60,100 60,60 80,80 100,50 120,80 140,60 140,100" fill="#FFD54A"/></svg>`,
  london_eye:`<svg viewBox="0 0 200 150"><rect width="200" height="150" fill="#bfe0ef"/><circle cx="100" cy="75" r="55" fill="none" stroke="#888" stroke-width="4"/></svg>`,
  wembley:`<svg viewBox="0 0 200 150"><rect width="200" height="150" fill="#bcdcff"/><ellipse cx="100" cy="100" rx="70" ry="35" fill="#cfd6dd"/><path d="M40 80 Q100 0 160 80" stroke="#888" stroke-width="4" fill="none"/></svg>`,
};
const FALLBACK_HTML = FALLBACK;
function pic(key, file){
  return `<img src="${IMG_DIR}${file}" alt="${key}" onerror="this.outerHTML=FALLBACK_HTML['${key}']">`;
}

/* ====== OTÁZKY (12) ======
   "miss" = vtipné hlášky vázané přímo k tématu otázky (vyberou se náhodně) */
const QUESTIONS = [
  { key:"mapa", file:"mapa.jpg", q:"Ve které zemi leží Londýn?",
    opts:["Velká Británie (Anglie)","Francie","Itálie","Španělsko"], correct:0,
    miss:["Hups! 🗺️ Asi sis spletl mapu — Londýn je o kus jinde!",
          "Jejda! 🌍 Tam by ses Londýna nedočkal, je jinde!",
          "Vedle! 🧭 Kompas tě trošku zradil, zkus to znovu!"],
    fact:"Víte, že… 🇬🇧 V samotném Londýně žije skoro 9 milionů lidí — skoro tolik jako v celém Česku!" },
  { key:"temze", file:"temze.jpg", q:"Jak se jmenuje řeka, která teče Londýnem?",
    opts:["Temže","Vltava","Dunaj","Nil"], correct:0,
    miss:["Žbluňk! 🌊 Tahle řeka teče úplně jinudy!",
          "Plác! 🐟 Spletl sis řeku — tahle Londýnem neteče!",
          "Hups! 🚣 Tudy by sis do Londýna nedoplaval!"],
    fact:"Víte, že… 🌉 Přes Temži vede přes 30 mostů a kdysi po ní pluly i velké zaoceánské lodě!" },
  { key:"flag", file:"flag.jpg", q:"Asi kolik lidí žije v Londýně?",
    opts:["Skoro 9 milionů","Asi 100 lidí","Asi 5 tisíc","Milion miliard"], correct:0,
    miss:["Hups! 🧮 To by se do Londýna ani nevešli, nebo by byl skoro prázdný!",
          "Jejda! 👥 Tolik lidí to fakt není — zkus to znovu!",
          "Vedle! 🔢 S počítáním to ještě potrénujeme!"],
    fact:"Víte, že… 🗣️ V Londýně se mluví víc než 300 různými jazyky — je to jedno z nejpestřejších měst světa!" },
  { key:"bigben", file:"bigben.jpg", q:"Co je Big Ben?",
    opts:["Slavná věž s velkými hodinami","Obří hamburger","Fotbalista","Druh čaje"], correct:0,
    miss:["Tik tak! ⏰ Big Ben není k jídlu ani na hraní — je to věž s hodinami!",
          "Hups! 🕰️ Big Ben ti odbíjí špatnou odpověď!",
          "Jejda! 🔔 To nebylo ono — Big Ben je slavná hodinová věž!"],
    fact:"Víte, že… 🔔 Big Ben je vlastně jméno toho velkého zvonu uvnitř věže — a slyšet ho jde i přes celé okolí!" },
  { key:"bus", file:"bus.jpg", q:"Jak se říká červenému autobusu, který má dvě patra?",
    opts:["Double-decker (dvoupatrový)","Helikoptéra","Tramvaj","Kolotoč"], correct:0,
    miss:["Brm brm! 🚌 Tímhle by ses po Londýně nesvezl, zkus to znovu!",
          "Hups! 🚍 Spletl sis dopravní prostředek!",
          "Vedle! 🎟️ Dvoupatrovému autobusu se říká double-decker!"],
    fact:"Víte, že… 🚌 Z horního patra double-deckeru je z okýnka pěkně vidět do ulic — sedět vepředu je nejlepší místo!" },
  { key:"buckingham", file:"buckingham.jpg", q:"Kdo bydlí v Buckinghamském paláci?",
    opts:["Královská rodina","Dinosauři","Pan učitel","Spider-Man"], correct:0,
    miss:["Hups! 👑 V paláci bys tohohle nikdy nepotkal!",
          "Jejda! 🏰 V Buckinghamu fakt nebydlí — zkus to znovu!",
          "Vedle! 🤴 Tady přebývá někdo mnohem královštější!"],
    fact:"Víte, že… 👑 Palác má přes 700 místností! Když vlaje vlajka na střeše, znamená to, že je král doma." },
  { key:"koruna", file:"koruna.jpg", q:"Kdo je hlavou Velké Británie?",
    opts:["Král","Kapitán pirátů","Robot","Klaun"], correct:0,
    miss:["Hups! 👑 Korunu na hlavě tenhle nenosí!",
          "Jejda! 🎩 To by byla teda zvláštní hlava státu!",
          "Vedle! 🤴 Zkus si představit, kdo nosí korunu!"],
    fact:"Víte, že… 🤴 Británii vládne král, ale o zákonech rozhoduje parlament — král to spíš slavnostně zastupuje." },
  { key:"towerbridge", file:"towerbridge.jpg", q:"Co je Tower Bridge?",
    opts:["Slavný most, který se umí zvednout","Tunel pod mořem","Velká houpačka","Strom"], correct:0,
    miss:["Hups! 🌉 Po tomhle bys přes Temži nepřešel!",
          "Jejda! 🚢 Tower Bridge se umí zvednout, aby propustil lodě — tohle ne!",
          "Vedle! 🏗️ Spletl sis to, je to slavný most!"],
    fact:"Víte, že… 🚢 Tower Bridge se umí rozevřít a zvednout do výšky, aby pod ním propluly velké lodě!" },
  { key:"westminster", file:"westminster.jpg", q:"Co je Westminster?",
    opts:["Místo, kde rozhodují o zákonech (parlament)","Zmrzlinárna","Vesmírná raketa","Bazén"], correct:0,
    miss:["Hups! 🏛️ Tam by ti zmrzlinu ani raketu nedali — rozhodují tam o zákonech!",
          "Jejda! 📜 Ve Westminsteru se to neděje, zkus to znovu!",
          "Vedle! 🗳️ To by byl teda divný parlament!"],
    fact:"Víte, že… 🏛️ Ve Westminsteru zasedá britský parlament — je to jedna z nejstarších takových budov na světě!" },
  { key:"london_eye", file:"london_eye.jpg", q:"Co je London Eye?",
    opts:["Obří vyhlídkové ruské kolo","Velké oko ze skla","Stroj času","Mrakodrap s tobogánem"], correct:0,
    miss:["Hups! 🎡 Tímhle by ses nad Londýn nepodíval — je to obří ruské kolo!",
          "Jejda! 👁️ London Eye se sice jmenuje 'oko', ale je to vyhlídkové kolo!",
          "Vedle! 🎠 Točí se to, ale jinak, než si myslíš!"],
    fact:"Víte, že… 🎡 London Eye je 135 metrů vysoké — jako 45 patrových autobusů na sobě! Jedno otočení trvá asi půl hodiny." },
  { key:"wembley", file:"wembley.jpg", q:"K čemu slouží stadion Wembley?",
    opts:["Hraje se tam hlavně fotbal","Pěstuje se tam zelí","Spí tam sloni","Je to obří bazén"], correct:0,
    miss:["Tys asi nikdy nehrál fotbal, viď? ⚽ Na Wembley se kope do míče!",
          "Hups! 🥅 Wembley je slavný fotbalový stadion, ne tohle!",
          "Vedle! ⚽ Gól! Ale do špatné branky — na Wembley se hraje fotbal!"],
    fact:"Víte, že… ⚽ Na Wembley se vejde skoro 90 000 diváků — to je jako kdyby přišlo celé velké město fandit!" },
  { key:"bigben", file:"bigben.jpg", q:"Jakým jazykem se v Londýně mluví?",
    opts:["Anglicky","Čínsky","Latinsky","Marťansky"], correct:0,
    miss:["Hups! 🗣️ Tímhle by ti v Londýně nerozuměli!",
          "Jejda! 💬 Zkus to znovu — čím se učíme ve škole na Anglii?",
          "Vedle! 📖 Tímhle jazykem se v Londýně nedomluvíš!"],
    fact:"Víte, že… 📚 Angličtinou dnes mluví lidé po celém světě — je to jeden z nejrozšířenějších jazyků vůbec!" },
];

/* ====== HLÁŠKY ====== */
const PRAISE = [
  `Super! 🎉 To bylo šikovné!`,
  `Výborně! 🌟 Dával jsi krásně pozor!`,
  `Bezva! 👏 Máš to v hlavě jako profík!`,
  `Paráda! 🚀 Takhle se to dělá!`,
  `Hurá! ✨ Trefa do černého!`,
  `Skvěle! 🏆 Malý expert na Londýn!`,
  `Jupí! 😄 Přesně tak!`,
  `Mistrovské! 🎯 Nedáš se splést!`,
  `Bravo! 🥳 Učitelka by měla radost!`,
  `Wow! 💪 Tohle byla hračka, co?`,
  `Klobouk dolů! 🎩 Správně!`,
  `Génius! 🧠 Jen tak dál!`,
];
const FUNNY_MISS = [
  "Ouha! 🙈 Tohle nebylo ono — ale klobouk dolů za odvahu!",
  "Hupsík! 🐸 Vedle jak ta jedle, zkus to příště!",
  "Jejda! 🍌 Skoro jako šlápnout na banán — nevadí!",
  "Pozor, špatná odbočka! 🚌 Autobus nás veze jinam.",
  "Húúú! 👻 Tuhle si zapamatuj, je záludná.",
  "Aj aj! 🐙 Chobotnice by to taky netrefila, žádný strach.",
  "Mňau! 🐱 Vedle, ale kočka by to taky nedala.",
  "Žbluňk! 🐟 Spadlo to do Temže, lovíme dál!",
  "Och! 🎩 Královna pokrčila rameny — zkus to znova příště!",
  "Bum! 💥 Vedle, ale objevitelé se nikdy nevzdávají!",
  "Jejdamane! 🦔 Trošku vedle, ale příště to dáš!",
  "Pšššt! 🤫 To nebylo ono, ale nikomu to neřekneme.",
];

/* ====== LOGIKA ====== */
let current = 0, score = 0, answered = false;
const screen = document.getElementById("screen");
const rnd = arr => arr[Math.floor(Math.random()*arr.length)];

function renderQuestion(){
  answered = false;
  const item = QUESTIONS[current];
  // zamíchej odpovědi: každá si nese info, jestli je správná
  const shuffled = item.opts
    .map((text,i)=>({text, correct: i===item.correct}))
    .sort(()=>Math.random()-0.5);
  screen.innerHTML = `
    <div class="progress">Otázka ${current+1} z ${QUESTIONS.length} &nbsp; • &nbsp; Body: ${score}</div>
    <div class="qwrap">
      <div class="pic">${pic(item.key, item.file)}</div>
      <div class="qside">
        <p class="q">${item.q}</p>
        <div class="opts">
          ${shuffled.map(o=>`<button class="opt" data-correct="${o.correct}">${o.text}</button>`).join('')}
        </div>
        <div class="feedback" id="fb"></div>
        <div class="fact" id="fact"></div>
        <button class="next" id="next">Další otázka ▶</button>
      </div>
    </div>
  `;
  screen.querySelectorAll(".opt").forEach(b=>b.addEventListener("click",onAnswer));
  screen.querySelector("#next").addEventListener("click",onNext);
}

function onAnswer(e){
  if(answered) return;
  answered = true;
  const isCorrect = e.target.dataset.correct === "true";
  const fb = document.getElementById("fb");
  screen.querySelectorAll(".opt").forEach(b=>{
    b.disabled = true;
    if(b.dataset.correct === "true") b.classList.add("correct"); // zvýrazni správnou
    if(b===e.target && !isCorrect) b.classList.add("wrong");      // a chybnou volbu
  });
  const item = QUESTIONS[current];
  if(isCorrect){ score++; fb.textContent = rnd(PRAISE); fb.className = "feedback ok"; }
  else {
    const pool = (item.miss && item.miss.length) ? item.miss : FUNNY_MISS;
    fb.textContent = rnd(pool); fb.className = "feedback no";
  }
  // bublina "Víte, že…" — ukáže se vždy po zodpovězení
  const factBox = document.getElementById("fact");
  if(item.fact){ factBox.textContent = item.fact; factBox.style.display = "block"; }
  const nx = screen.querySelector("#next");
  nx.style.display = "block";
  nx.textContent = (current === QUESTIONS.length-1) ? "Ukázat výsledek 🏁" : "Další otázka ▶";
}

function onNext(){
  if(current < QUESTIONS.length-1){ current++; renderQuestion(); }
  else renderResult();
}

function renderResult(){
  let medal, title, msg;
  if(score === QUESTIONS.length){ medal="🥇"; title="DOKONALÉ!"; msg=`Všechno správně! Opravdový znalec Londýna. Učitelka má radost! 🎉`; }
  else if(score >= 10){ medal="🥈"; title="SKVĚLÉ!"; msg=`Skoro všechno správně — pořádně jsi dával pozor!`; }
  else if(score >= 6){ medal="🥉"; title="DOBRÁ PRÁCE!"; msg=`Hodně jsi toho zvládl. Londýn už znáš fakt dobře!`; }
  else { medal="🎈"; title="ŠIKULA!"; msg=`Pár otázek bylo záludných — zkus kvíz ještě jednou, půjde ti to líp!`; }
  screen.innerHTML = `
    <div class="result">
      <div class="medal">${medal}</div>
      <h2>${title}</h2>
      <div class="score">${score} / ${QUESTIONS.length}</div>
      <p>${msg}</p>
      <button class="again" id="again">Hrát znovu 🔄</button>
    </div>`;
  screen.querySelector("#again").addEventListener("click",()=>{ current=0; score=0; renderQuestion(); });
}

renderQuestion();
</script>
</body>
</html>
